<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频知识点提取平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .drop-zone { transition: all .2s; }
  .drop-zone.dragover { border-color: #6366f1; background: #eef2ff; }
  .progress-bar { transition: width .3s ease; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white border-b px-6 py-3 flex items-center justify-between">
  <h1 class="text-lg font-semibold text-gray-800">视频知识点提取平台</h1>
  <span class="text-sm text-gray-400">局域网访问</span>
</nav>

<main class="max-w-4xl mx-auto px-4 py-8">

  <!-- Upload Section -->
  <section id="upload-section" class="mb-10">
    <div id="drop-zone" class="drop-zone border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer hover:border-indigo-400">
      <div class="text-4xl mb-3">📹</div>
      <p class="text-gray-600 mb-2">拖拽视频文件到这里，或点击选择</p>
      <p class="text-sm text-gray-400">支持 MP4 / MKV / AVI / MOV</p>
      <input id="file-input" type="file" accept="video/*" class="hidden">
    </div>
    <div id="upload-progress" class="hidden mt-4">
      <div class="flex items-center justify-between mb-1">
        <span id="upload-filename" class="text-sm text-gray-600"></span>
        <span id="upload-pct" class="text-sm text-indigo-600 font-medium"></span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2">
        <div id="upload-bar" class="progress-bar bg-indigo-500 h-2 rounded-full" style="width:0%"></div>
      </div>
    </div>
  </section>

  <!-- Task List -->
  <section>
    <h2 class="text-base font-medium text-gray-700 mb-4">历史记录</h2>
    <div id="task-list" class="space-y-3">
      <p class="text-gray-400 text-sm" id="empty-hint">暂无任务</p>
    </div>
  </section>

</main>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const uploadProgress = document.getElementById('upload-progress');
const uploadBar = document.getElementById('upload-bar');
const uploadPct = document.getElementById('upload-pct');
const uploadFilename = document.getElementById('upload-filename');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) uploadFile(fileInput.files[0]); });

async function uploadFile(file) {
  uploadFilename.textContent = file.name;
  uploadProgress.classList.remove('hidden');
  uploadBar.style.width = '0%';
  uploadPct.textContent = '上传中...';

  const form = new FormData();
  form.append('file', file);

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/upload');
  xhr.upload.onprogress = e => {
    if (e.lengthComputable) {
      const pct = Math.round(e.loaded / e.total * 100);
      uploadBar.style.width = pct + '%';
      uploadPct.textContent = pct + '%';
    }
  };
  xhr.onload = () => {
    if (xhr.status === 200) {
      const data = JSON.parse(xhr.responseText);
      if (data.duplicate) {
        uploadPct.textContent = '已有相同视频';
        uploadBar.style.width = '100%';
        uploadBar.classList.remove('bg-indigo-500');
        uploadBar.classList.add('bg-yellow-400');
        setTimeout(() => {
          uploadProgress.classList.add('hidden');
          uploadBar.classList.remove('bg-yellow-400');
          uploadBar.classList.add('bg-indigo-500');
        }, 2000);
      } else {
        uploadPct.textContent = '已提交';
      }
      setTimeout(() => { uploadProgress.classList.add('hidden'); }, 2500);
      loadTasks();
    } else {
      uploadPct.textContent = '上传失败';
    }
  };
  xhr.onerror = () => { uploadPct.textContent = '网络错误'; };
  xhr.send(form);
}

function statusBadge(status) {
  const map = {
    pending: ['等待中', 'bg-gray-100 text-gray-600'],
    processing: ['处理中', 'bg-blue-100 text-blue-700'],
    completed: ['已完成', 'bg-green-100 text-green-700'],
    failed: ['失败', 'bg-red-100 text-red-700'],
    cancelled: ['已取消', 'bg-yellow-100 text-yellow-700'],
  };
  const [label, cls] = map[status] || ['未知', 'bg-gray-100 text-gray-600'];
  return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${label}</span>`;
}

function taskCard(t) {
  const time = new Date(t.created_at).toLocaleString('zh-CN');
  const progressBar = t.status === 'processing'
    ? `<div class="mt-2"><div class="flex justify-between text-xs text-gray-500 mb-1"><span>${t.stage || ''}</span><span>${t.progress || 0}%</span></div><div class="w-full bg-gray-200 rounded-full h-1.5"><div class="progress-bar bg-indigo-500 h-1.5 rounded-full" style="width:${t.progress||0}%"></div></div></div>`
    : '';
  const actions = t.status === 'completed'
    ? `<div class="mt-2 flex gap-2"><a href="/task/${t.id}" class="text-xs text-indigo-600 hover:underline">查看报告</a><a href="/api/tasks/${t.id}/download/md" class="text-xs text-gray-500 hover:underline">下载 MD</a><a href="/api/tasks/${t.id}/download/json" class="text-xs text-gray-500 hover:underline">JSON</a></div>`
    : t.status === 'failed'
    ? `<p class="mt-1 text-xs text-red-500">${t.error || ''}</p>`
    : '';
  return `<div class="bg-white rounded-lg border p-4 hover:shadow-sm transition-shadow" data-id="${t.id}">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-lg">🎬</span>
        <div><p class="font-medium text-gray-800 text-sm">${t.video_name}</p><p class="text-xs text-gray-400">${time}</p></div>
      </div>
      <div class="flex items-center gap-2">${statusBadge(t.status)}<button onclick="deleteTask('${t.id}')" class="text-gray-300 hover:text-red-400 text-sm" title="删除">✕</button></div>
    </div>${progressBar}${actions}</div>`;
}

async function loadTasks() {
  const resp = await fetch('/api/tasks');
  const tasks = await resp.json();
  const list = document.getElementById('task-list');
  const hint = document.getElementById('empty-hint');
  if (tasks.length === 0) { hint.classList.remove('hidden'); list.innerHTML = ''; list.appendChild(hint); return; }
  hint.classList.add('hidden');
  list.innerHTML = tasks.map(taskCard).join('');
}

async function deleteTask(id) {
  if (!confirm('确定删除这个任务？')) return;
  await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
  loadTasks();
}

loadTasks();
setInterval(loadTasks, 3000);
</script>
</body>
</html>
